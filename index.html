<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Will you go out with me? 🥹</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Leckerli+One&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="floating-bg">
      <img class="float float1" src="assets/1.png" alt="floating 1" />
      <img class="float float2" src="assets/2.png" alt="floating 2" />
      <img class="float float3" src="assets/3.png" alt="floating 3" />
      <img class="float float4" src="assets/4.png" alt="floating 4" />
      <img class="float float5" src="assets/5.png" alt="floating 5" />
    </div>

    <!-- Patterned rain layer sits above floating images but beneath main content -->
    <div class="pattern-bg" aria-hidden="true"></div>

    <div class="wrapper">
      <h2 class="question">Laag ta?</h2>
      <img
        class="gif"
        alt="gif"
        src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExcW8xdHIzbzE0OTl0ejh0aHlzeGlxbW1qMXEzcmUwN29vZnc3cXJqayZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/ZbCPMeSbH8E2Fqh5fy/giphy.gif"
      />
      <div class="btn-group">
        <button class="yes-btn">Yes</button>
        <button class="no-btn">No</button>
      </div>
    </div>
    <script src="script.js"></script>
    
  </body>
</html>
